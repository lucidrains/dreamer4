<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamer4 - Replay Buffer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --danger: #f87171;
            --success: #34d399;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top right, #1f2937, #0b0f19);
        }

        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Layout */
        #layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 10;
        }

        #lhs {
            border-left: none;
        }

        #rhs {
            border-right: none;
            width: 320px;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .panel-header h1,
        .panel-header h2 {
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .panel-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .scrollable {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Episode List */
        .episode-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 0.9rem;
        }

        .episode-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }

        .episode-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--accent-hover);
        }

        .tag-length {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 12px;
            color: var(--text-muted);
        }

        .episode-item.active .tag-length {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-hover);
        }

        /* Schema List */
        .schema-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .schema-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .schema-name {
            font-weight: 500;
            color: var(--accent-hover);
            font-size: 0.95rem;
        }

        .schema-type {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .schema-shape {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .schema-shape code {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            color: #d1d5db;
        }

        /* Main Stage */
        #main-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            align-items: center;
            overflow-y: auto;
            position: relative;
        }

        .stage-empty {
            color: var(--text-muted);
            margin-top: 20vh;
            text-align: center;
        }

        #viewer-container {
            display: none;
            width: 100%;
            max-width: 800px;
            background: rgba(31, 41, 55, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #video-display {
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1;
            background: #000;
            border-radius: 8px;
            margin: 0 auto 30px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            image-rendering: pixelated;
        }

        .scrubber-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type=range] {
            flex-grow: 1;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .btn-play {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-play:hover {
            background: var(--accent-hover);
        }

        #frame-counter {
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .field-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
        }

        .field-name {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .field-value {
            font-size: 1.3rem;
            font-weight: 600;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }

        .field-value.bool-true {
            color: var(--success);
        }

        .field-value.bool-false {
            color: var(--danger);
        }

        .field-value.highlight {
            color: #f3f4f6;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="layout">

        <!-- LHS: Episodes -->
        <div id="lhs" class="sidebar glass">
            <div class="panel-header">
                <h1>Episodes</h1>
                <div class="panel-desc" id="stats-desc">Loading...</div>
            </div>
            <div class="scrollable" id="episode-list"></div>
        </div>

        <!-- Middle: Stage -->
        <div id="main-stage">
            <div id="loading-overlay">
                <div class="spinner"></div>
            </div>

            <div class="stage-empty" id="empty-state">
                <h2 style="font-weight:400">Select an episode</h2>
                <p style="font-size: 0.9rem">Choose an episode from the sidebar to inspect its frames.</p>
            </div>

            <div id="viewer-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
                    <h2 style="margin:0; font-weight: 500;">Episode <span id="ep-title-id"></span></h2>
                </div>

                <img id="video-display" src="" alt="Frame output">

                <div class="scrubber-container">
                    <button id="btn-play" class="btn-play">Play</button>
                    <input type="range" id="frame-scrubber" min="0" max="0" value="0">
                    <div id="frame-counter">0 / 0</div>
                </div>

                <div class="fields-grid" id="fields-container"></div>
            </div>
        </div>

        <!-- RHS: Schema -->
        <div id="rhs" class="sidebar glass">
            <div class="panel-header">
                <h2>Buffer Schema</h2>
                <div class="panel-desc">Structure of the tensors in the dataset.</div>
            </div>
            <div class="scrollable" id="schema-list"></div>
        </div>

    </div>

    <script>
        let currentEpisodeData = null;
        let currentFrame = 0;
        let isPlaying = false;
        let playInterval = null;

        const epList = document.getElementById('episode-list');
        const schemaList = document.getElementById('schema-list');
        const statsDesc = document.getElementById('stats-desc');
        const overlay = document.getElementById('loading-overlay');
        const viewerContainer = document.getElementById('viewer-container');
        const emptyState = document.getElementById('empty-state');

        const videoDisplay = document.getElementById('video-display');
        const scrubber = document.getElementById('frame-scrubber');
        const frameCounter = document.getElementById('frame-counter');
        const fieldsContainer = document.getElementById('fields-container');
        const epTitleId = document.getElementById('ep-title-id');
        const btnPlay = document.getElementById('btn-play');

        async function init() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                statsDesc.textContent = `${data.num_episodes} trajectories loaded`;

                // Render Schema
                schemaList.innerHTML = '';
                if (data.schema) {
                    for (const [field, info] of Object.entries(data.schema)) {
                        const item = document.createElement('div');
                        item.className = 'schema-item';
                        const shapeStr = info.is_meta
                            ? (info.shape.length > 0 ? `[ ${info.shape.join(', ')} ]` : `[] (Scalar)`)
                            : `[ T${info.shape.length > 0 ? ', ' + info.shape.join(', ') : ''} ]`;

                        item.innerHTML = `
                            <div class="schema-header">
                                <span class="schema-name">${field}</span>
                                <span class="schema-type">${info.type}</span>
                            </div>
                            <div class="schema-shape">
                                Shape: <code>${shapeStr}</code>
                            </div>
                        `;
                        schemaList.appendChild(item);
                    }
                }

                fetchEpisodes();
            } catch (e) {
                statsDesc.innerHTML = `<span style="color:var(--danger)">Failed to load stats</span>`;
            }
        }

        async function fetchEpisodes() {
            try {
                const res = await fetch('/api/episodes');
                const data = await res.json();

                epList.innerHTML = '';
                data.episodes.forEach(ep => {
                    const el = document.createElement('div');
                    el.className = 'episode-item';

                    let metaHtml = '';
                    if (ep.cum_reward !== undefined && ep.cum_reward !== null) {
                        metaHtml += `<span class="tag-length" style="background: rgba(52, 211, 153, 0.1); color: var(--success); margin-right: 4px;" title="Cumulative Reward">R: ${ep.cum_reward.toFixed(1)}</span>`;
                    }
                    if (ep.total_apples !== undefined && ep.total_apples !== null) {
                        metaHtml += `<span class="tag-length" style="background: rgba(248, 113, 113, 0.1); color: var(--danger); margin-right: 4px;" title="Total Apples">A: ${ep.total_apples}</span>`;
                    }

                    el.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <span>Episode ${ep.id + 1}</span>
                            <div style="display:flex; align-items: center; flex-wrap: wrap;">
                                ${metaHtml}
                            </div>
                        </div>
                        <span class="tag-length">${ep.length} steps</span>
                    `;
                    el.onclick = () => loadEpisode(ep.id, el);
                    epList.appendChild(el);
                });
            } catch (e) {
                console.error("Failed to load episodes", e);
            }
        }

        async function loadEpisode(id, el) {
            document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
            if (el) el.classList.add('active');

            overlay.style.display = 'flex';
            stopPlayback();

            try {
                const res = await fetch(`/api/episode/${id}`);
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Unknown server error");
                }

                currentEpisodeData = data;

                emptyState.style.display = 'none';
                viewerContainer.style.display = 'block';

                epTitleId.textContent = Number(id) + 1;
                scrubber.max = currentEpisodeData.frames.length - 1;

                renderFrame(0);
            } catch (e) {
                alert(`Failed to load episode data:\n\n${e.message}`);
            } finally {
                overlay.style.display = 'none';
            }
        }

        function renderFrame(index) {
            if (!currentEpisodeData || !currentEpisodeData.frames[index]) return;

            currentFrame = parseInt(index);
            scrubber.value = currentFrame;
            frameCounter.textContent = `${currentFrame} / ${currentEpisodeData.frames.length - 1}`;

            const frame = currentEpisodeData.frames[currentFrame];

            if (frame.video) {
                videoDisplay.src = "data:image/png;base64," + frame.video;
                videoDisplay.style.display = 'block';
            } else {
                videoDisplay.style.display = 'none';
            }

            fieldsContainer.innerHTML = '';
            for (const [key, value] of Object.entries(frame)) {
                if (key === 'video') continue;

                const card = document.createElement('div');
                card.className = 'field-card';

                let valStr = value;
                let valClass = 'highlight';

                if (typeof value === 'boolean') {
                    valStr = value ? 'True' : 'False';
                    valClass = value ? 'bool-true' : 'bool-false';
                } else if (typeof value === 'number') {
                    valStr = Number.isInteger(value) ? value : value.toFixed(3);
                }

                card.innerHTML = `<div class="field-name">${key}</div><div class="field-value ${valClass}">${valStr}</div>`;
                fieldsContainer.appendChild(card);
            }
        }

        function togglePlayback() { isPlaying ? stopPlayback() : startPlayback(); }

        function startPlayback() {
            if (!currentEpisodeData) return;
            isPlaying = true;
            btnPlay.textContent = 'Pause';

            if (currentFrame >= currentEpisodeData.frames.length - 1) currentFrame = 0;

            playInterval = setInterval(() => {
                if (currentFrame >= currentEpisodeData.frames.length - 1) stopPlayback();
                else renderFrame(currentFrame + 1);
            }, 250);
        }

        function stopPlayback() {
            isPlaying = false;
            btnPlay.textContent = 'Play';
            if (playInterval) clearInterval(playInterval);
        }

        scrubber.addEventListener('input', (e) => {
            stopPlayback();
            renderFrame(e.target.value);
        });

        btnPlay.addEventListener('click', togglePlayback);

        init();
    </script>
</body>

</html>
